<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LessonCanvas</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.0/math.min.js"></script>
<style>
  :root{
    --bg:#f7f8fb; --panel:#ffffff; --border:#e6e8f0; --text:#22252f; --text-dim:#767b8c;
    --accent:#5b6cf0; --accent-dim:#eef0fe; --accent-text:#3542c9;
    --good:#1e9e6b; --good-bg:#e7f8f0; --bad:#d64550; --bad-bg:#fdeceb; --warn:#b8790a; --warn-bg:#fff5e0;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--text);background:var(--bg);}
  .lc-app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

  .lc-header{
    display:flex;align-items:center;gap:16px;padding:14px 22px;background:var(--panel);
    border-bottom:1px solid var(--border);flex-shrink:0;
  }
  .lc-title{font-size:16px;font-weight:700;flex-shrink:0;}
  .lc-progress{display:flex;align-items:center;gap:6px;flex:1;justify-content:center;flex-wrap:wrap;}
  .lc-dot{
    width:9px;height:9px;border-radius:50%;background:var(--border);cursor:pointer;flex-shrink:0;transition:background .15s,transform .15s;
  }
  .lc-dot.active{background:var(--accent);transform:scale(1.3);}
  .lc-dot.done{background:#c7cbf5;}
  .lc-header-right{display:flex;gap:8px;flex-shrink:0;}

  .lc-btn{
    border:1px solid var(--border);background:#fff;color:var(--text);border-radius:10px;padding:8px 14px;
    font-size:13px;cursor:pointer;font-weight:600;
  }
  .lc-btn:hover{background:var(--accent-dim);}
  .lc-btn:disabled{opacity:.35;cursor:default;background:#fff;}
  .lc-btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  .lc-btn-primary:hover{background:#4a5adf;}
  .lc-btn-primary:disabled{opacity:.35;background:var(--accent);}
  .lc-btn-small{padding:5px 10px;font-size:12px;border-radius:8px;}

  .lc-toolbar{
    display:flex;gap:8px;padding:8px 22px;background:var(--panel);border-bottom:1px solid var(--border);
    flex-shrink:0;align-items:center;font-size:12px;color:var(--text-dim);
  }

  .lc-viewport{flex:1;overflow:hidden;position:relative;display:flex;justify-content:center;}
  .lc-slide{
    width:100%;max-width:820px;overflow-y:auto;padding:36px 40px 60px 40px;
  }
  .lc-slide::-webkit-scrollbar{width:8px;}
  .lc-slide::-webkit-scrollbar-thumb{background:#d6d9e6;border-radius:8px;}

  .lc-block{margin-bottom:22px;}
  .lc-block h1,.lc-block h2{margin:0 0 6px 0;font-weight:800;letter-spacing:-.01em;}
  .lc-block-heading{font-size:26px;font-weight:800;margin-bottom:14px;letter-spacing:-.01em;}
  .lc-block-text{font-size:15.5px;line-height:1.65;color:#33374a;}
  .lc-block-text ul{margin:6px 0;padding-left:22px;}
  .lc-block-math{font-size:17px;padding:10px 2px;}
  .lc-block-image{max-width:100%;}
  .lc-block-image img{max-width:100%;border-radius:10px;display:block;}
  .lc-block-image .lc-caption{font-size:12.5px;color:var(--text-dim);margin-top:6px;}
  .lc-block-pdf canvas{max-width:100%;border-radius:10px;border:1px solid var(--border);display:block;}
  .lc-block-video video, .lc-block-video iframe{width:100%;aspect-ratio:16/9;border-radius:10px;border:none;display:block;}

  .lc-end-screen{
    position:relative;min-height:360px;border-radius:16px;display:flex;align-items:center;justify-content:center;
    overflow:hidden;padding:30px;text-align:center;
  }
  .lc-end-confetti{background:linear-gradient(180deg,#eef2ff,#fbfaff);}
  .lc-confetti-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
  .lc-end-plain{background:var(--panel);border:1px solid var(--border);}
  .lc-end-content{position:relative;z-index:1;}
  .lc-end-emoji{font-size:52px;margin-bottom:10px;}
  .lc-end-title{font-size:24px;font-weight:800;letter-spacing:-.01em;margin-bottom:8px;}
  .lc-end-message{font-size:14.5px;color:#33374a;line-height:1.6;max-width:480px;margin:0 auto;}

  .lc-overview-title, .lc-performance-card .lc-overview-title{font-size:16px;font-weight:800;margin-bottom:10px;}
  .lc-overview-list{margin:0;padding-left:20px;font-size:14.5px;line-height:1.7;color:#33374a;}
  .lc-performance-score{font-size:20px;font-weight:800;color:var(--accent-text);margin-bottom:14px;}
  .lc-performance-list{display:flex;flex-direction:column;gap:6px;}
  .lc-performance-row{display:flex;align-items:flex-start;gap:8px;font-size:14px;padding:6px 0;border-top:1px solid var(--border);}
  .lc-performance-row:first-child{border-top:none;}
  .lc-performance-icon{flex-shrink:0;}
  .lc-performance-label{color:#33374a;}

  .lc-card{
    background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;
  }

  .lc-widget-button{
    background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 18px;
    font-size:14px;font-weight:700;cursor:pointer;
  }
  .lc-widget-button:hover{background:#4a5adf;}

  .lc-hidden-reveal{display:none;}
  .lc-hidden-reveal.shown{display:block;margin-top:12px;}

  .lc-slider-row{display:flex;align-items:center;gap:12px;}
  .lc-slider-row input[type=range]{flex:1;}
  .lc-slider-val{font-weight:700;min-width:48px;text-align:right;color:var(--accent-text);}
  .lc-slider-label{font-size:13.5px;color:var(--text-dim);margin-bottom:8px;}

  .lc-mc-option{
    display:block;width:100%;text-align:left;background:#fff;border:1.5px solid var(--border);border-radius:10px;
    padding:11px 14px;margin-bottom:8px;cursor:pointer;font-size:14.5px;transition:border-color .1s,background .1s;
  }
  .lc-mc-option:hover{border-color:var(--accent);}
  .lc-mc-option.correct{border-color:var(--good);background:var(--good-bg);color:var(--good);font-weight:700;}
  .lc-mc-option.incorrect{border-color:var(--bad);background:var(--bad-bg);color:var(--bad);font-weight:700;}
  .lc-mc-option.disabled{cursor:default;}
  .lc-mc-question{font-weight:700;margin-bottom:12px;font-size:15px;}
  .lc-feedback{margin-top:10px;padding:10px 12px;border-radius:8px;font-size:13.5px;font-weight:600;}
  .lc-feedback.good{background:var(--good-bg);color:var(--good);}
  .lc-feedback.bad{background:var(--bad-bg);color:var(--bad);}

  .lc-reveal-toggle{
    background:transparent;border:1.5px dashed var(--border);color:var(--accent-text);border-radius:10px;
    padding:9px 16px;font-size:13.5px;font-weight:700;cursor:pointer;
  }
  .lc-reveal-toggle:hover{background:var(--accent-dim);}

  .lc-num-row{display:flex;gap:8px;align-items:center;}
  .lc-num-row input[type=text]{
    border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:14.5px;width:140px;
  }

  .lc-steps-list{margin-top:10px;padding:10px 14px;background:#f4f5fb;border-radius:9px;font-size:13.5px;}
  .lc-steps-list ol{margin:0;padding-left:18px;}
  .lc-steps-list li{margin-bottom:4px;}

  .lc-warn-banner{
    display:flex;gap:8px;align-items:flex-start;background:var(--warn-bg);color:var(--warn);
    border:1px solid #f2dca0;border-radius:9px;padding:9px 12px;font-size:12.5px;margin-bottom:10px;font-weight:600;
  }

  .lc-custom-frame{width:100%;border:1px solid var(--border);border-radius:10px;min-height:120px;display:block;}

  .lc-footer{
    display:flex;justify-content:space-between;align-items:center;padding:14px 22px;background:var(--panel);
    border-top:1px solid var(--border);flex-shrink:0;
  }

  .lc-dev-panel{
    position:fixed;top:0;right:0;bottom:0;width:420px;max-width:90vw;background:#fff;border-left:1px solid var(--border);
    box-shadow:-8px 0 30px rgba(0,0,0,.12);z-index:100;display:flex;flex-direction:column;padding:16px;
  }
  .lc-dev-panel textarea{
    flex:1;font-family:ui-monospace,Consolas,monospace;font-size:12px;border:1px solid var(--border);border-radius:8px;
    padding:10px;resize:none;margin:10px 0;
  }
  .lc-dev-panel-header{display:flex;justify-content:space-between;align-items:center;}
  .lc-dev-status{font-size:12px;color:var(--text-dim);margin-top:6px;min-height:16px;}

  .lc-empty-state{
    display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-dim);
    text-align:center;gap:10px;padding:40px;
  }

  .lc-modal-backdrop{
    position:fixed;inset:0;background:rgba(20,22,30,.45);z-index:200;
    display:flex;align-items:center;justify-content:center;padding:24px;
  }
  .lc-modal-panel{
    background:#fff;border-radius:16px;width:min(1100px,96vw);height:min(760px,90vh);
    display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25);
  }
  .lc-modal-header{
    display:flex;align-items:center;justify-content:space-between;padding:12px 16px;
    border-bottom:1px solid var(--border);flex-shrink:0;
  }
  .lc-modal-header strong{font-size:14px;}
  .lc-modal-body{flex:1;min-height:0;}
  .lc-modal-body iframe{width:100%;height:100%;border:none;display:block;}
  .lc-modal-body-scroll{flex:1;min-height:0;overflow-y:auto;padding:16px 20px;}

  .lc-ai-panel{width:420px;max-width:94vw;height:min(600px,86vh);}
  .lc-ai-messages{flex:1;min-height:0;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px;}
  .lc-ai-msg{max-width:85%;padding:9px 12px;border-radius:12px;font-size:13.5px;line-height:1.5;white-space:pre-wrap;}
  .lc-ai-msg-user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px;}
  .lc-ai-msg-bot{align-self:flex-start;background:var(--accent-dim);color:var(--text);border-bottom-left-radius:4px;}
  .lc-ai-msg-error{align-self:flex-start;background:var(--bad-bg);color:var(--bad);}
  .lc-ai-inputrow{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;}
  .lc-ai-inputrow textarea{
    flex:1;resize:none;border:1px solid var(--border);border-radius:10px;padding:8px 10px;
    font-size:13.5px;font-family:inherit;min-height:38px;max-height:100px;
  }

  .lc-badge{
    display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;
    padding:0 4px;margin-left:5px;border-radius:8px;background:var(--accent);color:#fff;
    font-size:10px;font-weight:800;vertical-align:middle;
  }
  .lc-sources-toolbar{display:flex;justify-content:flex-end;padding:0 20px 8px 20px;flex-shrink:0;}
  .lc-source-card{
    display:flex;align-items:flex-start;gap:10px;border:1px solid var(--border);border-radius:10px;
    padding:12px 14px;margin-bottom:10px;
  }
  .lc-source-icon{font-size:20px;flex-shrink:0;line-height:1;}
  .lc-source-main{flex:1;min-width:0;}
  .lc-source-label-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:4px;}
  .lc-source-label{font-weight:700;font-size:14px;word-break:break-word;margin-bottom:0;}
  .lc-source-manual-tag{
    font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--text-dim);
    background:#eef0f2;padding:2px 6px;border-radius:5px;flex-shrink:0;
  }
  .lc-icon-btn-delete{
    flex-shrink:0;border:none;background:transparent;cursor:pointer;font-size:14px;color:var(--text-dim);
    width:26px;height:26px;border-radius:6px;
  }
  .lc-icon-btn-delete:hover{background:var(--bad-bg);color:var(--bad);}
  .lc-source-sub{font-size:12px;color:var(--text-dim);word-break:break-all;}
  .lc-source-actions{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;}
  .lc-source-thumb{max-width:100%;max-height:160px;border-radius:8px;display:block;margin-top:8px;}
  .lc-source-pdf-preview canvas{max-width:100%;border-radius:8px;border:1px solid var(--border);margin-top:8px;}
  .lc-sources-empty{color:var(--text-dim);font-size:13px;text-align:center;padding:30px 10px;}

  .lc-inspect-section-title{
    font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-dim);
    font-weight:700;margin:16px 0 8px 0;
  }
  .lc-inspect-section-title:first-child{margin-top:0;}
  .lc-inspect-card{border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
  .lc-inspect-name{font-family:ui-monospace,Consolas,monospace;font-weight:700;font-size:13px;color:var(--accent-text);margin-bottom:4px;}
  .lc-inspect-desc{font-size:13px;color:#33374a;line-height:1.5;margin-bottom:8px;}
  .lc-inspect-example{
    background:#f4f5fb;border-radius:7px;padding:8px 10px;font-family:ui-monospace,Consolas,monospace;
    font-size:11.5px;color:#33374a;white-space:pre-wrap;word-break:break-word;margin:0;user-select:text;
  }
</style>
</head>
<body>
<div id="lc-root" class="lc-app"></div>

<script>
/* =========================================================================
   LessonCanvas — JSON-driven interactive teaching shell.
   Public entry point: window.loadLesson(lessonObject)
   ========================================================================= */
(function(){

  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

  const root = document.getElementById('lc-root');

  // ---- state ----
  let lesson = { title:'Untitled Lesson', slides:[] };
  let currentSlide = 0;
  let assets = {}; // id -> {kind:'image', dataUrl} | {kind:'pdf', doc: pdfjs document, pageCount}
  let assetSeq = 0;
  // blockId -> { type, correct, selected|value, question } — recorded whenever a
  // graded block (multiple_choice/number_input) is answered, for two purposes:
  // (1) letting an answer survive navigating away and back (opt out per-block via
  //     the AI-authored `lockAnswer:false`, never a student-facing control), and
  // (2) powering the performance_summary end-screen block, which reads this
  //     regardless of lockAnswer so scoring always works even if the UI doesn't lock.
  let answerState = {};

  function recordAnswer(blockId, data){
    if(!blockId) return;
    answerState[blockId] = data;
  }

  function computeLessonScore(){
    const items = [];
    (lesson.slides||[]).forEach(slide=>{
      (slide.blocks||[]).forEach(block=>{
        if((block.type==='multiple_choice' || block.type==='number_input') && block.id){
          const ans = answerState[block.id];
          items.push({
            id: block.id,
            question: block.question || '(untitled question)',
            answered: !!ans,
            correct: !!(ans && ans.correct)
          });
        }
      });
    });
    return {
      items,
      total: items.length,
      answeredCount: items.filter(i=>i.answered).length,
      correctCount: items.filter(i=>i.correct).length
    };
  }

  function uid(prefix){ return (prefix||'id') + '-' + Math.random().toString(36).slice(2,9); }

  // ---- lightweight markdown for `text` blocks ----
  function renderMiniMarkdown(text){
    const lines = String(text||'').split('\n');
    let html = '';
    let inList = false;
    lines.forEach(line=>{
      const trimmed = line.trim();
      if(/^[-*]\s+/.test(trimmed)){
        if(!inList){ html += '<ul>'; inList = true; }
        html += '<li>' + inlineFormat(trimmed.replace(/^[-*]\s+/,'')) + '</li>';
      } else {
        if(inList){ html += '</ul>'; inList = false; }
        if(trimmed === ''){ html += '<br>'; }
        else html += '<p>' + inlineFormat(trimmed) + '</p>';
      }
    });
    if(inList) html += '</ul>';
    return html;
  }
  function inlineFormat(s){
    return s
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>');
  }
  function renderMathIn(el){
    if(window.renderMathInElement){
      try{
        renderMathInElement(el, {
          delimiters: [
            {left:'$$', right:'$$', display:true},
            {left:'$', right:'$', display:false}
          ],
          throwOnError:false
        });
      }catch(e){}
    }
  }

  // ---- asset registry (Phase 5) ----
  function registerImageAsset(dataUrl){
    const id = uid('img');
    assets[id] = { kind:'image', dataUrl };
    return id;
  }
  async function registerPdfAsset(arrayBuffer){
    const id = uid('pdf');
    const doc = await pdfjsLib.getDocument({data:arrayBuffer}).promise;
    assets[id] = { kind:'pdf', doc, pageCount: doc.numPages };
    return id;
  }

  // ---- video URL detection ----
  function videoEmbedUrl(src){
    const yt = src.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([\w-]+)/);
    if(yt) return { kind:'iframe', url: 'https://www.youtube.com/embed/' + yt[1] };
    const vimeo = src.match(/vimeo\.com\/(\d+)/);
    if(vimeo) return { kind:'iframe', url: 'https://player.vimeo.com/video/' + vimeo[1] };
    return { kind:'file', url: src };
  }

  // ---- Phase 6: math verification ----
  function verifyBlock(block){
    const v = block.verification;
    if(!v || !v.check_expression) return; // nothing to auto-check
    try{
      const scope = {}; scope[v.check_variable] = v.check_value;
      const result = math.evaluate(v.check_expression, scope);
      const expected = v.expected_result;
      const ok = typeof result === 'number' && typeof expected === 'number' && Math.abs(result-expected) < 1e-6;
      block._verified = ok;
      block._verifyComputed = result;
      if(!ok){
        console.warn('[LessonCanvas] Verification MISMATCH for block "'+(block.id||'(no id)')+'": '+
          'stated correct_answer='+JSON.stringify(block.correct_answer)+', check_expression="'+v.check_expression+'" '+
          'evaluated to '+result+' but expected_result='+expected);
      }
    }catch(e){
      block._verified = false;
      block._verifyComputed = null;
      console.warn('[LessonCanvas] Verification could not be evaluated for block "'+(block.id||'(no id)')+'": '+e.message);
    }
  }
  function runVerificationPass(lessonObj){
    (lessonObj.slides||[]).forEach(slide=>{
      (slide.blocks||[]).forEach(block=>{
        if((block.type==='multiple_choice' || block.type==='number_input') && block.verification){
          verifyBlock(block);
        }
      });
    });
  }

  // ---- block renderers ----
  function findBlockById(blockId){
    return document.querySelector('[data-block-id="'+CSS.escape(blockId)+'"]');
  }

  function makeWarnBanner(block){
    const el = document.createElement('div');
    el.className = 'lc-warn-banner';
    el.innerHTML = '⚠️ <span>This question could not be automatically verified — the answer key may be incorrect. '+
      '(stated vs. computed check mismatch — see console for details)</span>';
    return el;
  }

  let currentTargetedIds = new Set();
  function computeTargetedIds(blocks){
    const ids = new Set();
    (blocks||[]).forEach(b=>{
      if(b.type === 'button' && b.action && (b.action.type === 'reveal_block' || b.action.type === 'reveal_hint') && b.action.target){
        ids.add(b.action.target);
      }
      if(b.type === 'slider' && b.on_threshold && b.on_threshold.reveal_block){
        ids.add(b.on_threshold.reveal_block);
      }
    });
    return ids;
  }

  function renderBlocks(blocks, container){
    (blocks||[]).forEach(block=>{
      const el = renderBlock(block);
      if(el) container.appendChild(el);
    });
  }

  // renderBlock dispatches purely by looking up BLOCK_REGISTRY[block.type] — there
  // is no separate switch statement to fall out of sync with. BLOCK_REGISTRY (defined
  // further down, once all the individual renderXBlock/renderXWidget functions exist)
  // is also exactly what the Inspect Elements panel reads to document every block
  // type, so adding a new block type to the registry is the ONE place that both
  // makes it renderable and makes it show up in Inspect Elements — you cannot add
  // one without the other.
  function renderBlock(block){
    const wrap = document.createElement('div');
    wrap.className = 'lc-block';
    if(block.id) wrap.dataset.blockId = block.id;
    // a block targeted by a button's reveal_block/reveal_hint action or a slider's
    // on_threshold starts hidden — otherwise there's nothing for the trigger to reveal
    if(block.id && block.type !== 'reveal' && currentTargetedIds.has(block.id)){
      wrap.classList.add('lc-hidden-reveal');
    }

    const entry = BLOCK_REGISTRY[block.type];
    if(entry){
      entry.render(block, wrap);
    } else {
      const unk = document.createElement('div');
      unk.style.cssText = 'color:#b3261e;font-size:12px;';
      unk.textContent = 'Unsupported block type: ' + block.type;
      wrap.appendChild(unk);
    }
    return wrap;
  }

  function renderHeadingBlock(block, wrap){
    const h = document.createElement('div');
    h.className = 'lc-block-heading';
    h.textContent = block.text || '';
    wrap.appendChild(h);
    renderMathIn(h);
  }
  function renderTextBlock(block, wrap){
    const t = document.createElement('div');
    t.className = 'lc-block-text';
    t.innerHTML = renderMiniMarkdown(block.text || '');
    wrap.appendChild(t);
    renderMathIn(t);
  }
  function renderMathBlock(block, wrap){
    const m = document.createElement('div');
    m.className = 'lc-block-math';

  async function renderPdfPage(assetId, pageNum, canvas){
    const asset = assets[assetId];
    if(!asset || asset.kind !== 'pdf'){
      const ctx = canvas.getContext('2d');
      canvas.width = 400; canvas.height = 80;
      ctx.fillStyle = '#fdeceb'; ctx.fillRect(0,0,400,80);
      ctx.fillStyle = '#d64550'; ctx.font = '13px sans-serif';
      ctx.fillText('PDF asset "'+assetId+'" not found in registry', 10, 44);
      return;
    }
    try{
      const page = await asset.doc.getPage(pageNum);
      const viewport = page.getViewport({ scale: 1.5 });
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    }catch(e){
      const ctx = canvas.getContext('2d');
      canvas.width = 400; canvas.height = 60;
      ctx.fillStyle = '#d64550'; ctx.font = '12px sans-serif';
      ctx.fillText('Could not render page '+pageNum+': '+e.message, 10, 32);
    }
  }

    if(!action) return;

      if(target){
        const revealEl = target.classList.contains('lc-hidden-reveal') ? target : (target.querySelector('.lc-hidden-reveal') || target);

        revealEl.style.display = 'block';

    } else if(action.type === 'go_to_slide'){
      const idx = lesson.slides.findIndex(s=>s.id === action.target);

  // Custom widgets are arbitrary-height content in a sandboxed iframe. A fixed/short
  // iframe height forces internal scrolling, which can hide the top of the widget
  // (e.g. a diagram) while the user scrolls down to reach a button below it — a real
  // trap for any AI-authored widget whose content height isn't known in advance.
  // Fix: every custom iframe self-reports its content height via postMessage (the one
  // channel available even without allow-same-origin), and the shell resizes the
  // iframe to fit exactly, so nothing ever scrolls inside it.
  const RESIZE_REPORTER_SNIPPET = `
<script>
(function(){
  function reportSize(){
    var h = Math.max(
      document.documentElement.scrollHeight,
      document.body ? document.body.scrollHeight : 0,
      document.documentElement.getBoundingClientRect().height,
      document.body ? document.body.getBoundingClientRect().height : 0
    );
    parent.postMessage({ __lessonCanvasResize: true, height: h }, '*');
  }
  window.addEventListener('load', reportSize);
  if(window.ResizeObserver){
    new ResizeObserver(reportSize).observe(document.documentElement);
    if(document.body) new ResizeObserver(reportSize).observe(document.body);
  }
  // layout can keep settling after load (fonts, canvas scaling, etc.) — keep
  // re-measuring for a bit rather than trusting a single early snapshot
  [50, 150, 300, 600, 1000, 1800].forEach(function(delay){ setTimeout(reportSize, delay); });
  // the parent can also explicitly ask for a fresh measurement (e.g. once it
  // knows the iframe box itself has actually been laid out and painted) —
  // don't rely solely on this iframe's own timers being trustworthy
  window.addEventListener('message', function(e){
    if(e.data && e.data.__lessonCanvasRequestResize) reportSize();
  });
})();
<\/script>
`;

  window.addEventListener('message', function(e){
    if(!e.data || !e.data.__lessonCanvasResize) return;
    document.querySelectorAll('.lc-custom-frame').forEach(f=>{
      if(f.contentWindow === e.source){
        // only ever grow to fit — a later, more-settled measurement should win,
        // but a stray early undershoot must never shrink it back down
        const prevMax = parseFloat(f.dataset.maxReportedHeight || '0');
        const nextMax = Math.max(prevMax, e.data.height);
        if(nextMax > prevMax){
          f.dataset.maxReportedHeight = String(nextMax);
          f.style.height = Math.max(120, nextMax + 28) + 'px';
        }
      }
    });
  });

  function renderCustomWidget(block, wrap){
    const ifr = document.createElement('iframe');
    ifr.className = 'lc-custom-frame';
    ifr.setAttribute('sandbox', 'allow-scripts');
    ifr.srcdoc = (block.html || '') + RESIZE_REPORTER_SNIPPET;
    wrap.appendChild(ifr);

    // Belt-and-braces: actively re-ping the iframe to re-measure for a few
    // seconds after it's actually in the live DOM, since a widget's own
    // internal timers can fire before the surrounding page has finished
    // laying out and painting the iframe box itself.
    let pings = 0;
    const maxPings = 20;
    function ping(){
      pings++;
      const goodEnough = parseFloat(ifr.dataset.maxReportedHeight || '0') > 40;
      if(pings > maxPings || goodEnough || !ifr.isConnected) return;
      try{ ifr.contentWindow.postMessage({ __lessonCanvasRequestResize: true }, '*'); }catch(e){}
      setTimeout(ping, 150);
    }
    setTimeout(ping, 150);
  }

  // ---- end-of-lesson elements ----
  // These are ordinary block types an authoring AI can drop into a lesson's final
  // slide — there's no separate "end slide" concept, just more blocks. All four
  // are here so the AI has a real choice to make per lesson (celebratory vs. plain,
  // a recap vs. a scored breakdown) rather than a single hardcoded completion screen.
  function startConfetti(canvas, container){
    // renderEndConfetti calls this before `container` has actually been inserted
    // into the live DOM (renderBlocks appends the returned element afterwards),
    // so clientWidth/Height would read 0 if measured synchronously here — defer
    // sizing (and therefore particle placement) to the next animation frame,
    // by which point the browser has laid the slide out for real.
    const ctx = canvas.getContext('2d');
    const colors = ['#5b6cf0','#d64550','#1e9e6b','#e8a33d','#8a5cf0'];
    let particles = [];
    let ready = false;

    function resize(){
      canvas.width = container.clientWidth;
      canvas.height = container.clientHeight;
    }
    function initParticles(){
      resize();
      if(canvas.width < 2 || canvas.height < 2) return false; // still not laid out — try again next frame
      particles = [];
      for(let i=0;i<130;i++){
        particles.push({
          x: Math.random()*canvas.width,
          y: -20 - Math.random()*canvas.height,
          w: 6+Math.random()*6,
          h: 8+Math.random()*8,
          color: colors[Math.floor(Math.random()*colors.length)],
          speed: 1.5+Math.random()*2.5,
          drift: (Math.random()-0.5)*1.5,
          rotation: Math.random()*360,
          rotSpeed: (Math.random()-0.5)*8
        });
      }
      return true;
    }
    function onResize(){ if(ready) resize(); }
    window.addEventListener('resize', onResize);

    function frame(){
      if(!canvas.isConnected){ window.removeEventListener('resize', onResize); return; } // slide navigated away
      if(!ready){
        ready = initParticles();
        requestAnimationFrame(frame);
        return;
      }
      ctx.clearRect(0,0,canvas.width,canvas.height);
      particles.forEach(p=>{
        p.y += p.speed;
        p.x += p.drift;
        p.rotation += p.rotSpeed;
        if(p.y > canvas.height + 20){ p.y = -20; p.x = Math.random()*canvas.width; }
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation*Math.PI/180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
      });
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  // ---- slide navigation ----
  function renderSlide(index){
    const viewport = document.getElementById('lc-viewport');
    viewport.innerHTML = '';
    if(!lesson.slides.length){
      const empty = document.createElement('div');
      empty.className = 'lc-empty-state';
      empty.innerHTML = '<div style="font-size:38px;">📄</div><div style="font-size:15px;font-weight:600;">No lesson loaded</div>'+
        '<div style="font-size:13px;">Upload a PDF/PNG, or use the dev panel to paste lesson JSON.</div>';
      viewport.appendChild(empty);
      return;
    }
    const slide = lesson.slides[index];
    const slideEl = document.createElement('div');
    slideEl.className = 'lc-slide';
    slideEl.dataset.slideId = slide.id || ('slide-'+index);
    currentTargetedIds = computeTargetedIds(slide.blocks);
    renderBlocks(slide.blocks, slideEl);
    viewport.appendChild(slideEl);
    renderMathIn(slideEl);
    updateChrome();

  function updateChrome(){
    document.getElementById('lc-back').disabled = currentSlide <= 0;
    document.getElementById('lc-next').disabled = currentSlide >= lesson.slides.length-1 || lesson.slides.length===0;
    document.getElementById('lc-title').textContent = lesson.title || 'Untitled Lesson';
    const dotsWrap = document.getElementById('lc-progress');
    dotsWrap.innerHTML = '';
    lesson.slides.forEach((s,i)=>{
      const dot = document.createElement('div');
      dot.className = 'lc-dot' + (i===currentSlide?' active':(i<currentSlide?' done':''));
      dot.title = 'Slide ' + (i+1);
      dot.addEventListener('click', ()=>goToSlide(i));
      dotsWrap.appendChild(dot);
    });
    updateSourcesButton();
  }

  function goToSlide(index){
    if(index < 0 || index >= lesson.slides.length) return;
    currentSlide = index;
    renderSlide(currentSlide);
  }

  // ---- Phase 2 / public API ----
  // A pasted/uploaded object might be valid JSON but not an actual lesson — e.g.
  // a single block copied out of Inspect Elements ({ "type":"heading", ... })
  // rather than a full { title, slides:[...] } document. Catch that up front
  // rather than silently accepting it and wiping out whatever was loaded before.
  function validateLessonObject(obj){
    const errors = [];
    if(!obj || typeof obj !== 'object' || Array.isArray(obj)){
      errors.push('This isn\'t a JSON object at all.');
      return errors;
    }
    if(!Array.isArray(obj.slides)){
      errors.push('Missing a top-level "slides" array — this looks like a single element (e.g. copied from Inspect Elements), not a full lesson. A lesson needs the shape { "title":"...", "slides":[ { "id":"...", "blocks":[ <your element here> ] } ] }.');
    } else if(obj.slides.length === 0){
      errors.push('The "slides" array is empty — a lesson needs at least one slide.');
    } else {
      const badIdx = obj.slides.findIndex(s => !s || typeof s !== 'object' || !Array.isArray(s.blocks));
      if(badIdx !== -1) errors.push('Slide at index ' + badIdx + ' is missing its own "blocks" array.');
    }
    return errors;
  }

  // Single-level undo: the state right before the most recent successful load,
  // so a mistaken (but technically valid) lesson load can be reversed back to
  // whatever was actually on screen before it — not just rejected outright.
  let lastGoodSnapshot = null;

  function loadLesson(lessonObject){
    const errors = validateLessonObject(lessonObject);
    if(errors.length){
      console.error('[LessonCanvas] Refusing to load — this JSON does not represent a valid lesson:\n' + errors.join('\n'));
      return { ok:false, errors };
    }

    // snapshot what's about to be replaced, before touching anything, so it can
    // be restored exactly via window.undoLastLoad()
    lastGoodSnapshot = { lesson: JSON.parse(JSON.stringify(lesson)), answerState: JSON.parse(JSON.stringify(answerState)) };

    // lesson is fully replaced (not merged) each call, so switching the shell to a
    // different lesson/purpose automatically drops any prior sources/slides — no
    // stale content survives a new load. Use window.clearSources() to wipe just the
    // sources list without touching slides, if that's all that needs resetting.
    lesson = Object.assign({ title:'Untitled Lesson', slides:[], sources:[] }, lessonObject||{});
    lesson.slides = lesson.slides || [];
    lesson.sources = lesson.sources || [];
    answerState = {}; // a new lesson means a clean slate for locked-in answers too
    runVerificationPass(lesson);
    currentSlide = 0;
    renderSlide(0);
    if(sourcesModalEl) renderSourcesModalBody();
    updateUndoButtonState();
    return { ok:true };
  }
  window.loadLesson = loadLesson;

  function undoLastLoad(){
    if(!lastGoodSnapshot) return false;
    lesson = lastGoodSnapshot.lesson;
    answerState = lastGoodSnapshot.answerState;
    lastGoodSnapshot = null; // single-level undo, not a full history stack
    currentSlide = 0;
    runVerificationPass(lesson);
    renderSlide(0);
    if(sourcesModalEl) renderSourcesModalBody();
    updateUndoButtonState();
    return true;
  }
  window.undoLastLoad = undoLastLoad;

  function updateUndoButtonState(){
    const btn = document.getElementById('lc-dev-undo');
    if(btn) btn.disabled = !lastGoodSnapshot;
  }
  window.__lessonCanvasAssets = assets; // exposed for debugging/manual asset wiring

  // ---- Phase 1: manual upload toolbar (dev/testing convenience) ----
  function addBlockToCurrentSlide(block){
    if(!lesson.slides.length){
      lesson.slides.push({ id: uid('slide'), blocks: [] });
    }
    lesson.slides[currentSlide].blocks.push(block);
    renderSlide(currentSlide);
  }

  function handlePngUpload(file){
    const reader = new FileReader();
    reader.onload = ()=>{
      const id = registerImageAsset(reader.result);
      const blockId = uid('blk');
      addBlockToCurrentSlide({ id: blockId, type:'image', src:id, caption: file.name });
      // manual:true + createdBlockId is what lets the Sources panel delete this again —
      // an AI-authored source (no createdBlockId, not manual) never gets a delete button
      addSource({ type:'image', src:id, label: file.name, manual:true, createdBlockId: blockId });
    };
    reader.readAsDataURL(file);
  }

  async function handlePdfUpload(file){
    const buf = await file.arrayBuffer();
    const id = await registerPdfAsset(buf);
    const asset = assets[id];
    const insertAt = currentSlide;
    const newSlides = [];
    for(let p=1; p<=asset.pageCount; p++){
      newSlides.push({ id: uid('slide'), blocks: [
        { type:'heading', text: file.name + ' — page ' + p + ' of ' + asset.pageCount },
        { type:'pdf_page', src:id, page:p }
      ]});
    }
    lesson.slides.splice(insertAt+1, 0, ...newSlides);
    addSource({ type:'pdf', src:id, label: file.name, page:1, manual:true, createdSlideIds: newSlides.map(s=>s.id) });
    goToSlide(insertAt+1);
  }

  // ---- embedded calculator (GraphCalc, opened alongside a lesson) ----
  function decodeGraphCalcHtml(){
    const binary = atob(GRAPHCALC_HTML_B64);
    const bytes = new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
    return new TextDecoder('utf-8').decode(bytes);
  }
  let calcModalEl = null;

    if(calcModalEl){ closeCalculatorModal(); return; }
    calcModalEl = document.createElement('div');
    calcModalEl.className = 'lc-modal-backdrop';

        </div>
        <div class="lc-modal-body">

        </div>
      </div>
    `;
    document.body.appendChild(calcModalEl);
    // GraphCalc is embedded inline (base64-decoded) rather than loaded via a
    // relative src="graphcalc.html" -- that broke whenever this lesson file was
    // copied, renamed, or opened from somewhere graphcalc.html wasn't sitting
    // right next to it. Embedding it means the calculator travels with this
    // single file no matter where it goes.
    calcModalEl.querySelector('iframe').srcdoc = decodeGraphCalcHtml();
    document.getElementById('lc-calc-close').addEventListener('click', closeCalculatorModal);

  // ---- Sources section ----
  // A lesson-wide place for the authoring AI to list everything it drew on
  // (links, PDFs, images, plain citations) — separate from slide content, so
  // it's somewhere to both recall from while authoring and for the student to
  // check. Lives on lessonObject.sources, an array of:
  //   { type:'link', url, label }
  //   { type:'image', src, label }   -- src resolves against the asset registry, like image blocks
  //   { type:'pdf', src, label, page }
  //   { type:'text', label }         -- a plain citation with no attachment
  function resolveAssetSrc(src){
    const asset = assets[src];
    return (asset && asset.kind === 'image') ? asset.dataUrl : src;
  }

  function renderSourceCard(source, index){
    const card = document.createElement('div');
    card.className = 'lc-source-card';
    const icon = document.createElement('div');
    icon.className = 'lc-source-icon';
    icon.textContent = { link:'🔗', image:'🖼️', pdf:'📄', text:'📝' }[source.type] || '📎';
    card.appendChild(icon);

    const main = document.createElement('div');
    main.className = 'lc-source-main';
    const labelRow = document.createElement('div');
    labelRow.className = 'lc-source-label-row';
    const label = document.createElement('div');
    label.className = 'lc-source-label';
    label.textContent = source.label || '(untitled source)';
    labelRow.appendChild(label);
    if(source.manual){
      const tag = document.createElement('span');
      tag.className = 'lc-source-manual-tag';
      tag.textContent = 'uploaded by you';
      labelRow.appendChild(tag);
    }
    main.appendChild(labelRow);

    if(source.type === 'link' && source.url){
      const sub = document.createElement('div');
      sub.className = 'lc-source-sub';
      sub.textContent = source.url;
      main.appendChild(sub);
      const actions = document.createElement('div');
      actions.className = 'lc-source-actions';
      const a = document.createElement('a');
      a.href = source.url; a.target = '_blank'; a.rel = 'noopener noreferrer';
      a.className = 'lc-btn lc-btn-small';
      a.textContent = 'Open link ↗';
      actions.appendChild(a);
      main.appendChild(actions);
    } else if(source.type === 'image' && source.src){
      const img = document.createElement('img');
      img.className = 'lc-source-thumb';
      img.src = resolveAssetSrc(source.src);
      img.alt = source.label || '';
      main.appendChild(img);
    } else if(source.type === 'pdf' && source.src){
      const actions = document.createElement('div');
      actions.className = 'lc-source-actions';
      const viewBtn = document.createElement('button');
      viewBtn.className = 'lc-btn lc-btn-small';
      viewBtn.textContent = 'View page ' + (source.page || 1);
      const previewWrap = document.createElement('div');
      previewWrap.className = 'lc-source-pdf-preview';
      previewWrap.style.display = 'none';
      let rendered = false;
      viewBtn.addEventListener('click', ()=>{
        const shown = previewWrap.style.display === 'none';
        previewWrap.style.display = shown ? 'block' : 'none';
        if(shown && !rendered){
          rendered = true;
          const canvas = document.createElement('canvas');
          previewWrap.appendChild(canvas);
          renderPdfPage(source.src, source.page || 1, canvas);
        }
      });
      actions.appendChild(viewBtn);
      main.appendChild(actions);
      main.appendChild(previewWrap);
    }
    card.appendChild(main);

    // Only sources the user manually uploaded (PNG/PDF toolbar) can be deleted —
    // anything the authoring AI put in lesson.sources has no createdBlockId/
    // createdSlideIds and no manual flag, so it never gets a delete button here.
    if(source.manual){
      const delBtn = document.createElement('button');
      delBtn.className = 'lc-icon-btn-delete';
      delBtn.title = 'Remove this upload from the lesson';
      delBtn.textContent = '🗑';
      delBtn.addEventListener('click', ()=>{
        if(confirm('Remove "' + (source.label||'this upload') + '"? This also removes it from the slide(s) it was added to.')){
          deleteManualSource(index);
        }
      });
      card.appendChild(delBtn);
    }
    return card;
  }

  function deleteManualSource(index){
    const source = (lesson.sources||[])[index];
    if(!source || !source.manual) return; // AI-given sources are never deletable, even if this were reached some other way
    if(source.createdBlockId){
      lesson.slides.forEach(slide=>{
        slide.blocks = (slide.blocks||[]).filter(b=>b.id !== source.createdBlockId);
      });
    }
    if(source.createdSlideIds && source.createdSlideIds.length){
      lesson.slides = lesson.slides.filter(s=>!source.createdSlideIds.includes(s.id));
    }
    lesson.sources.splice(index,1);
    if(currentSlide >= lesson.slides.length) currentSlide = Math.max(0, lesson.slides.length-1);
    updateSourcesButton();
    if(sourcesModalEl) renderSourcesModalBody();
    renderSlide(currentSlide);
  }

  // ---- AI helper (chat panel backed by a Worker /api/ask endpoint) ----
  let aiHelperModalEl = null;
  let aiHelperMessages = [];

  function getCurrentSlideContext(){
    const slide = lesson.slides[currentSlide];
    if(!slide) return '';
    const parts = [];
    (slide.blocks||[]).forEach(b=>{
      if(b.type==='heading') parts.push(b.text||'');
      else if(b.type==='text') parts.push(String(b.text||'').replace(/<[^>]+>/g,' '));
      else if(b.type==='math') parts.push('Math: ' + (b.tex||b.latex||''));
      else if(b.type==='image' && b.caption) parts.push('Image caption: ' + b.caption);
    });
    return parts.join('\n').trim();
  }

  function renderAiHelperMessages(){
    const body = aiHelperModalEl.querySelector('.lc-ai-messages');
    body.innerHTML = '';
    if(!aiHelperMessages.length){
      const hint = document.createElement('div');
      hint.className = 'lc-ai-msg lc-ai-msg-bot';
      hint.textContent = "Hi! Ask me about this slide, or anything else you're stuck on.";
      body.appendChild(hint);
    }
    aiHelperMessages.forEach(m=>{
      const el = document.createElement('div');
      el.className = 'lc-ai-msg ' + (m.role==='user' ? 'lc-ai-msg-user' : m.role==='error' ? 'lc-ai-msg-error' : 'lc-ai-msg-bot');
      el.textContent = m.text;
      body.appendChild(el);
    });
    body.scrollTop = body.scrollHeight;
  }

  async function sendAiHelperQuestion(){
    const input = document.getElementById('lc-ai-input');
    const question = input.value.trim();
    if(!question) return;
    input.value = '';
    aiHelperMessages.push({role:'user', text:question});
    const sendBtn = document.getElementById('lc-ai-send');
    sendBtn.disabled = true;
    aiHelperMessages.push({role:'bot', text:'Thinking…'});
    renderAiHelperMessages();
    try{
      const res = await fetch('/api/ask', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ question, context: getCurrentSlideContext() })
      });
      if(!res.ok) throw new Error('request failed (' + res.status + ')');
      const data = await res.json();
      aiHelperMessages.pop();
      aiHelperMessages.push({role:'bot', text: data.answer || '(no answer returned)'});
    }catch(err){
      aiHelperMessages.pop();
      aiHelperMessages.push({role:'error', text:'AI helper is unavailable right now (' + err.message + ').'});
    }
    sendBtn.disabled = false;
    renderAiHelperMessages();
  }

  function toggleAiHelperModal(){
    if(aiHelperModalEl){ closeAiHelperModal(); return; }

    document.body.appendChild(aiHelperModalEl);

  // ---- Block registry: the single source of truth for both rendering and docs ----
  // Every entry here is simultaneously (a) what renderBlock() dispatches to, and
  // (b) what the Inspect Elements panel documents. There is no second list to
  // remember to update — adding a block type to this registry is what makes it
  // both renderable AND documented in the same step. See the startup check below
  // that warns if an entry is ever added without a desc/example (or vice versa).
  const BLOCK_REGISTRY = {
    heading: { section:'Content blocks', desc:'A slide title.', example:'{ "type":"heading", "text":"What is a logarithm?" }', render: renderHeadingBlock },
    text: { section:'Content blocks', desc:'Paragraph text. Supports **bold**, *italic*, "- " lists, and inline $latex$.', example:'{ "type":"text", "text":"A **logarithm** answers..." }', render: renderTextBlock },
    math: { section:'Content blocks', desc:'A KaTeX-rendered equation.', example:'{ "type":"math", "latex":"\\\\log_a(x) = y" }', render: renderMathBlock },
    image: { section:'Content blocks', desc:'An image, resolved by id against the asset registry (or a direct URL).', example:'{ "type":"image", "src":"img-abc123", "caption":"..." }', render: renderImageBlock },
    pdf_page: { section:'Content blocks', desc:'One page of an uploaded PDF, resolved by asset id.', example:'{ "type":"pdf_page", "src":"pdf-abc123", "page":3 }', render: renderPdfPageBlock },
    video: { section:'Content blocks', desc:'Embeds a YouTube/Vimeo URL as an iframe, or any other URL as a plain <video>.', example:'{ "type":"video", "src":"https://youtube.com/watch?v=..." }', render: renderVideoBlock },

    button: { section:'Interactive widgets', desc:'Triggers an action: reveal_block, reveal_hint, or go_to_slide.', example:'{ "type":"button", "label":"Show hint", "action":{ "type":"reveal_block", "target":"hint-1" } }', render: renderButtonWidget },
    slider: { section:'Interactive widgets', desc:'A draggable numeric control; can reveal another block once a threshold value is crossed.', example:'{ "type":"slider", "label":"x", "min":0, "max":10, "on_threshold":{ "value":5, "reveal_block":"note-1" } }', render: renderSliderWidget },
    multiple_choice: { section:'Interactive widgets', desc:'Graded question with instant right/wrong feedback. Give it an "id" so lockAnswer and the performance_summary can reference it.', example:'{ "type":"multiple_choice", "id":"mc1", "question":"...", "options":["a","b"], "correct_answer":1 }', render: renderMultipleChoiceWidget },
    reveal: { section:'Interactive widgets', desc:'A show/hide toggle for hint or optional content.', example:'{ "type":"reveal", "label_show":"Show hint", "content":"..." }', render: renderRevealWidget },
    number_input: { section:'Interactive widgets', desc:'Graded free-response numeric question with a tolerance.', example:'{ "type":"number_input", "id":"num1", "question":"...", "correct_answer":24, "tolerance":0.01 }', render: renderNumberInputWidget },

    custom: { section:'Escape hatch', desc:'Arbitrary HTML/JS in a sandboxed iframe (allow-scripts only, no access to the parent page). Auto-sized to its content — no manual height needed.', example:`{ "type":"custom", "html":"<canvas id='c'></canvas><script>...<\/script>" }`, render: renderCustomWidget },

    end_confetti: { section:'End-of-lesson elements (pick per lesson — no single default)', desc:'Celebratory finish with an animated confetti canvas.', example:'{ "type":"end_confetti", "title":"Great job!", "message":"You finished the lesson." }', render: renderEndConfetti },
    end_plain: { section:'End-of-lesson elements (pick per lesson — no single default)', desc:'A calm, non-animated completion screen.', example:'{ "type":"end_plain", "title":"Lesson complete", "message":"..." }', render: renderEndPlain },
    lesson_overview: { section:'End-of-lesson elements (pick per lesson — no single default)', desc:'A short bullet-point recap of what was covered.', example:'{ "type":"lesson_overview", "title":"What we covered", "points":["Point one", "Point two"] }', render: renderLessonOverview },
    performance_summary: { section:'End-of-lesson elements (pick per lesson — no single default)', desc:'Auto-computed scorecard across every graded question in the lesson — no manual tallying needed.', example:'{ "type":"performance_summary", "title":"How you did" }', render: renderPerformanceSummary },
  };

  // Concepts documented in Inspect Elements that are NOT block types (so they can
  // never be derived from BLOCK_REGISTRY) — fields on existing blocks, or top-level
  // lessonObject fields. Kept separate and deliberately small: anything that's an
  // actual renderable block belongs in BLOCK_REGISTRY above instead.
  const EXTRA_DOCS = [
    { section:'Answer verification (multiple_choice / number_input only)', items:[
      { type:'verification', desc:'Worked steps for the hint flow, plus an optional independently-evaluable check (check_expression/check_variable/check_value/expected_result) the app verifies at load time — mismatches show an amber warning instead of silently trusting a wrong answer key.', example:'"verification": { "steps":["..."], "check_expression":"4*t", "check_variable":"t", "check_value":6, "expected_result":24 }' },
      { type:'lockAnswer', desc:'AI-only flag on a graded block (default true). When true, a submitted answer stays locked in — right/wrong shown — if the student navigates away and back. Set false to let the student retry on return.', example:'{ "type":"multiple_choice", ..., "lockAnswer": false }' },
    ]},
    { section:'Lesson-level (not a block — a top-level lessonObject field)', items:[
      { type:'sources', desc:'An array the AI uses to list everything it drew on: links, images, PDFs, or plain citations. Shown in the header Sources panel with a live count badge.', example:'"sources": [ { "type":"link", "url":"https://...", "label":"..." }, { "type":"text", "label":"Smith, J. (2020)." } ]' },
    ]},
  ];

  // Cheap startup guardrail: catches a registry entry added with a render function
  // but no docs (or vice versa) — the exact drift this registry design is meant to
  // make impossible, so a mistake here should be loud, not silently shipped.
  (function checkBlockRegistryIntegrity(){
    Object.keys(BLOCK_REGISTRY).forEach(type=>{
      const e = BLOCK_REGISTRY[type];
      if(typeof e.render !== 'function') console.warn('[LessonCanvas] BLOCK_REGISTRY["'+type+'"] has no render function.');
      if(!e.desc) console.warn('[LessonCanvas] BLOCK_REGISTRY["'+type+'"] is missing a desc for Inspect Elements.');
      if(!e.example) console.warn('[LessonCanvas] BLOCK_REGISTRY["'+type+'"] is missing an example for Inspect Elements.');
      if(!e.section) console.warn('[LessonCanvas] BLOCK_REGISTRY["'+type+'"] is missing a section for Inspect Elements.');
    });
  })();

  window.__lessonCanvasBlockRegistry = BLOCK_REGISTRY; // debug hook — the exact same object renderBlock() and Inspect Elements both read

  // ---- Inspect Elements ----
  // A read-only reference of every block type the authoring AI can use, so a
  // human reviewing the lesson can point at a specific one in chat ("use a
  // slider here", "add a performance_summary at the end") without guessing at
  // names. Purely informational: no click-to-insert, no editing, no state —
  // just documentation to look at. Sourced from BLOCK_REGISTRY (+ EXTRA_DOCS for
  // the handful of non-block concepts), so it can never miss a real block type.
  let inspectModalEl = null;
  function toggleInspectElementsModal(){
    if(inspectModalEl){ closeInspectElementsModal(); return; }
    inspectModalEl = document.createElement('div');
    inspectModalEl.className = 'lc-modal-backdrop';
    const panel = document.createElement('div');
    panel.className = 'lc-modal-panel';
    panel.innerHTML = `
      <div class="lc-modal-header">
        <strong>Inspect Elements — read only</strong>
        <button class="lc-btn lc-btn-small" id="lc-inspect-close">✕ Close</button>
      </div>
      <div class="lc-modal-body-scroll" id="lc-inspect-body"></div>
    `;
    inspectModalEl.appendChild(panel);
    document.body.appendChild(inspectModalEl);

    const body = panel.querySelector('#lc-inspect-body');
    function renderInspectCard(item){
      const card = document.createElement('div');
      card.className = 'lc-inspect-card';
      const name = document.createElement('div');
      name.className = 'lc-inspect-name';
      name.textContent = item.type;
      const desc = document.createElement('div');
      desc.className = 'lc-inspect-desc';
      desc.textContent = item.desc;
      const example = document.createElement('pre');
      example.className = 'lc-inspect-example';
      example.textContent = item.example;
      card.appendChild(name); card.appendChild(desc); card.appendChild(example);
      return card;
    }
    function renderInspectSection(title, items){
      const secTitle = document.createElement('div');
      secTitle.className = 'lc-inspect-section-title';
      secTitle.textContent = title;
      body.appendChild(secTitle);
      items.forEach(item=>body.appendChild(renderInspectCard(item)));
    }

    // grouped straight from BLOCK_REGISTRY — every real block type shows up here
    // automatically, in the order it was registered, with no separate list to edit
    const sectionOrder = [];
    const sectionMap = {};
    Object.keys(BLOCK_REGISTRY).forEach(type=>{
      const entry = BLOCK_REGISTRY[type];
      if(!sectionMap[entry.section]){ sectionMap[entry.section] = []; sectionOrder.push(entry.section); }
      sectionMap[entry.section].push({ type, desc: entry.desc, example: entry.example });
    });
    sectionOrder.forEach(sec=>renderInspectSection(sec, sectionMap[sec]));
    EXTRA_DOCS.forEach(sec=>renderInspectSection(sec.section, sec.items));

    panel.querySelector('#lc-inspect-close').addEventListener('click', closeInspectElementsModal);
    inspectModalEl.addEventListener('mousedown', (e)=>{ if(e.target === inspectModalEl) closeInspectElementsModal(); });
    document.addEventListener('keydown', inspectModalEscHandler);
  }
  function inspectModalEscHandler(e){ if(e.key === 'Escape') closeInspectElementsModal(); }
  function closeInspectElementsModal(){
    if(!inspectModalEl) return;
    inspectModalEl.remove();
    inspectModalEl = null;
    document.removeEventListener('keydown', inspectModalEscHandler);
  }

  const w = canvas.width, h = canvas.height;

  function hillY(t){
    return 40 + (h-90) * (t*t);
  }

  function drawHill(ballT){
    ctx.clearRect(0,0,w,h);
    ctx.strokeStyle = '#5b6cf0';
    ctx.lineWidth = 4;
    ctx.beginPath();
    for(let i=0;i<=100;i++){
      const t = i/100;
      const x = 30 + t*(w-60);
      const y = hillY(t);
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);

    ctx.stroke();
    if(ballT !== undefined){
      const bx = 30 + ballT*(w-60);
      const by = hillY(ballT) - 10;
      ctx.fillStyle = '#d64550';
      ctx.beginPath();
      ctx.arc(bx, by, 10, 0, Math.PI*2);
      ctx.fill();
    }
  }

  drawHill(0);

  let animId = null;
  document.getElementById('rollBtn').addEventListener('click', function(){
    if(animId) cancelAnimationFrame(animId);
    const start = performance.now();

      const elapsed = now - start;
      const t = Math.min(1, elapsed/duration);
      const eased = t*t;
      drawHill(eased);
      const y0 = hillY(Math.max(0,eased-0.01));
      const y1 = hillY(eased);
      const speed = (y1-y0) / 0.01;

        'Position: ' + Math.round(eased*100) + '%  Speed: ' + speed.toFixed(2) + '  (ball \\u2192 rolling faster as slope steepens)';

    animId = requestAnimationFrame(frame);
  });
})();

      animId = requestAnimationFrame(frame);
    }

          { type:"text", text:`A **rate of change** tells you how fast something is changing — whether that's a ball speeding up as it rolls downhill, or a runner covering ground over time.

Here's the general idea:
- It's always a *ratio*: how much one quantity changes compared to another
- On a graph, it's the slope of the line connecting two points
- The steeper the slope, the faster the rate of change

We'll explore this two ways: a hill (where the rate keeps changing) and a race (where the rate stays constant).` },
